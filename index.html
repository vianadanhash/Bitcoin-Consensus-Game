<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Class: Consenso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Press Start 2P', cursive; background-color: #0f172a; color: white; image-rendering: pixelated; }
        .pixel-border { border: 4px solid #fff; box-shadow: 6px 6px 0px #000; }
        .btn-pixel:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border: 2px solid #000; }
    </style>
</head>
<body class="p-4">

    <header class="text-center mb-6">
        <h1 class="text-xl text-yellow-400 mb-2">BITCOIN CLASS: CONSENSO</h1>
        <div id="display-sala" class="text-[10px] text-blue-400 mb-4">SALA: ...</div>
        <div id="status-ronda" class="bg-red-600 inline-block px-4 py-2 text-[8px] pixel-border border-black">
            CARGANDO / LOADING...
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
        <div class="bg-blue-900 p-6 pixel-border border-blue-400">
            <h2 class="text-[8px] mb-4" id="txt-wallet">MI BILLETERA</h2>
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-gray-800 border-2 border-white flex items-center justify-center text-xl">👾</div>
                <div>
                    <p class="text-[8px] text-gray-300" id="my-name">...</p>
                    <p class="text-lg text-green-400 mt-2" id="my-balance">0 BTC</p>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 pixel-border border-yellow-500">
            <h2 class="text-[8px] mb-4 text-yellow-400" id="txt-send">ENVIAR MONEDAS</h2>
            <div class="space-y-4">
                <select id="destinatario" class="w-full bg-black border-2 border-gray-600 p-2 text-[8px] text-white">
                    <option value="" id="txt-loading-users">Cargando...</option>
                </select>
                <input id="monto" type="number" placeholder="CANTIDAD" class="w-full bg-black border-2 border-gray-600 p-2 text-[8px] text-white">
                <button onclick="enviarTransaccion()" class="w-full bg-green-600 p-3 text-[8px] btn-pixel border-2 border-black" id="txt-btn-send">
                    ENVIAR AL LIBRO
                </button>
            </div>
        </div>

        <div class="bg-black p-6 pixel-border border-purple-500">
            <h2 class="text-[8px] mb-4 text-purple-400" id="txt-ledger">LIBRO PÚBLICO (MEMPOOL)</h2>
            <div id="ledger" class="space-y-4 h-64 overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div id="panel-profe" class="mt-8 text-center hidden">
        <button onclick="cambiarRonda(1)" class="bg-red-700 p-2 text-[8px] mx-1 pixel-border border-black" id="txt-r1">Ronda 1</button>
        <button onclick="cambiarRonda(2)" class="bg-purple-700 p-2 text-[8px] mx-1 pixel-border border-black" id="txt-r2">Ronda 2</button>
        <button onclick="limpiarDatos()" class="bg-gray-700 p-2 text-[8px] mx-1 pixel-border border-black" id="txt-clear">Borrar Todo</button>
    </div>

    <script>
        // === DICCIONARIO BILINGÜE ===
        const i18n = {
            es: {
                askRoom: "CÓDIGO DE SALA (ej: CLASE01)", askName: "¿CUAL ES TU NOMBRE?", errorRoom: "Código requerido.",
                wallet: "MI BILLETERA", send: "ENVIAR MONEDAS", ledger: "LIBRO PÚBLICO (MEMPOOL)", 
                btnSend: "ENVIAR AL LIBRO", loading: "Cargando receptores...", r1: "RONDA 1: CONTROL CENTRAL",
                r2: "RONDA 2: CONSENSO", emisor: "Saldo emisor", clear: "Borrar Todo", confirmClear: "¿Borrar sala?"
            },
            en: {
                askRoom: "ROOM CODE (e.g., CLASS01)", askName: "WHAT IS YOUR NAME?", errorRoom: "Room code required.",
                wallet: "MY WALLET", send: "SEND COINS", ledger: "PUBLIC LEDGER (MEMPOOL)", 
                btnSend: "SEND TO LEDGER", loading: "Loading users...", r1: "ROUND 1: CENTRALIZED CONTROL",
                r2: "ROUND 2: CONSENSUS", emisor: "Sender balance", clear: "Clear All", confirmClear: "Delete room data?"
            }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBJGxv-FEAn6G58GnuTjrls_0ovn4WCN7Q",
            authDomain: "bitcoinclassconsensus.firebaseapp.com",
            databaseURL: "https://bitcoinclassconsensus-default-rtdb.firebaseio.com",
            projectId: "bitcoinclassconsensus",
            storageBucket: "bitcoinclassconsensus.firebasestorage.app",
            messagingSenderId: "890839108801",
            appId: "1:890839108801:web:c336f917c8d43ca5549840"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let lang = prompt("Choose language / Elige idioma (es / en):") === 'en' ? 'en' : 'es';
        let t = i18n[lang];

        // Aplicar textos al azar
        document.getElementById('txt-wallet').innerText = t.wallet;
        document.getElementById('txt-send').innerText = t.send;
        document.getElementById('txt-ledger').innerText = t.ledger;
        document.getElementById('txt-btn-send').innerText = t.btnSend;
        document.getElementById('txt-loading-users').innerText = t.loading;
        document.getElementById('txt-clear').innerText = t.clear;

        let roomCode = prompt(t.askRoom).toUpperCase().trim();
        if(!roomCode) { alert(t.errorRoom); location.reload(); }
        let myName = prompt(t.askName) || "Anon";
        let myId = myName.toLowerCase().replace(/\s/g, ''); 

        const roomRef = db.ref('rooms/' + roomCode);
        document.getElementById('display-sala').innerText = "SALA/ROOM: " + roomCode;
        document.getElementById('my-name').innerText = myName;

        if(myId === 'profe' || myId === 'profesor') document.getElementById('panel-profe').classList.remove('hidden');

        const userRef = roomRef.child('users/' + myId);
        userRef.once('value', snapshot => {
            if(!snapshot.exists()) userRef.set({ nombre: myName, saldo: Math.floor(Math.random() * 400) + 100 });
        });

        userRef.child('saldo').on('value', snap => { document.getElementById('my-balance').innerText = (snap.val() || 0) + " BTC"; });

        roomRef.child('estado/ronda').on('value', snap => {
            let rnd = snap.val() || 1;
            const s = document.getElementById('status-ronda');
            s.innerText = rnd === 1 ? t.r1 : t.r2;
            s.className = rnd === 1 ? "bg-red-600 inline-block px-4 py-2 text-[8px] pixel-border border-black" : "bg-purple-600 inline-block px-4 py-2 text-[8px] pixel-border border-black";
        });

        roomRef.child('users').on('value', snap => {
            const sel = document.getElementById('destinatario');
            sel.innerHTML = `<option value="">${t.loading}</option>`;
            snap.forEach(u => { if(u.key !== myId) sel.innerHTML += `<option value="${u.key}">${u.val().nombre}</option>`; });
        });

        function enviarTransaccion() {
            const dest = document.getElementById('destinatario').value;
            const monto = parseInt(document.getElementById('monto').value);
            if(!dest || !monto) return;
            roomRef.child('transactions').push({ de: myId, deNombre: myName, para: dest, monto: monto, estado: 'pendiente', votosFavor: 0, votosContra: 0 });
            document.getElementById('monto').value = '';
        }

        roomRef.child('transactions').on('value', snapshot => {
            const ledger = document.getElementById('ledger');
            ledger.innerHTML = '';
            snapshot.forEach(child => {
                const tx = child.val();
                const txId = child.key;
                roomRef.child('users/' + tx.de + '/saldo').once('value', sSnap => {
                    const saldoEmisor = sSnap.val() || 0;
                    const color = tx.estado === 'aprobada' ? 'border-green-500' : (tx.estado === 'rechazada' ? 'border-red-500' : 'border-yellow-500');
                    let html = `<div class="border-l-4 ${color} pl-2 py-2 bg-gray-900 mb-2 text-[7px]">
                        <p>${tx.deNombre} ➔ ${tx.para}: <span class="text-green-400">${tx.monto} BTC</span></p>
                        <p class="text-gray-400">${t.emisor}: ${saldoEmisor} BTC</p>`;
                    if(tx.estado === 'pendiente') {
                        if(myId === 'profe') {
                            html += `<button onclick="resolverTx('${txId}','aprobada','${tx.de}','${tx.para}',${tx.monto})" class="bg-green-700 p-1 mt-1 border border-black">OK</button>`;
                        } else {
                            html += `<button onclick="votar('${txId}','favor')" class="bg-blue-700 p-1 mt-1">👍</button> <span class="text-[6px]">Votos: ${tx.votosFavor||0}</span>`;
                        }
                    }
                    html += `</div>`;
                    ledger.insertAdjacentHTML('afterbegin', html);
                });
            });
        });

        function resolverTx(id, est, de, para, m) {
            if(est === 'aprobada') {
                roomRef.child('users/'+de+'/saldo').transaction(s => s - m);
                roomRef.child('users/'+para+'/saldo').transaction(s => s + m);
            }
            roomRef.child('transactions/'+id).update({estado: est});
        }

        function votar(id, tipo) {
            roomRef.child('transactions/'+id).transaction(tx => {
                if(tx) { 
                    tx.votosFavor = (tx.votosFavor||0)+1; 
                    if(tx.votosFavor >= 3) { 
                        tx.estado = 'aprobada';
                        roomRef.child('users/'+tx.de+'/saldo').transaction(s => s - tx.monto);
                        roomRef.child('users/'+tx.para+'/saldo').transaction(s => s + tx.monto);
                    }
                }
                return tx;
            });
        }

        function cambiarRonda(n) { roomRef.child('estado/ronda').set(n); }
        function limpiarDatos() { if(confirm(t.confirmClear)) roomRef.remove(); location.reload(); }
    </script>
</body>
</html>
